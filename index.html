<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Safe-Home Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <header>
        <p>Community Safety Watch</p>
        <h1>Check-ins</h1>
      </header>
      <div class="header-actions">
        <button class="btn-main" id="new-trip-btn">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
          >
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          New Trip
        </button>
      </div>
      <div id="event-list" class="event-list"></div>

      <div class="section-divider">Trip Log (Safe Arrivals)</div>
      <div class="history-bucket">
        <div id="history-list"></div>
        <div style="text-align: center; margin-top: 1.5rem">
          <button class="clear-log-btn" id="clear-history-btn">
            Clear History Log
          </button>
        </div>
      </div>
    </div>

    <div id="overlay" class="overlay">
      <div class="modal">
        <h2
          class="serif"
          style="font-size: 2.5rem; margin-bottom: 2rem"
          id="modal-title"
        >
          Trip Details
        </h2>
        <div class="form-group">
          <label>Traveler Role</label>
          <select id="inp-role">
            <option value="" disabled selected>Select Role</option>
            <option value="driver">Driver (E-Hailing)</option>
            <option value="passenger">Passenger (E-Hailing)</option>
          </select>
        </div>

        <!-- Checklist Instruction Placeholder -->
        <div id="checklist-placeholder" class="checklist-placeholder">
          <p>Please select a role to view safety checklist</p>
        </div>

        <!-- Checklist Section -->
        <div id="checklist-wrapper" style="display: none; margin-top: 1rem">
          <div class="checklist-header">
            <label>Safety Preparedness</label>
            <span id="checklist-progress-text">0%</span>
          </div>
          <div class="progress-bar-container">
            <div id="checklist-progress-bar" class="progress-bar-fill"></div>
          </div>
          <div id="checklist-items" class="checklist-items-grid">
            <!-- Checkboxes injected by JS -->
          </div>
        </div>

        <div class="form-group">
          <label>Commuter Name</label
          ><input type="text" id="inp-name" placeholder="Name of traveler" />
        </div>

        <div
          style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem"
        >
          <div class="form-group">
            <label>Trip Date</label><input type="date" id="inp-date" />
          </div>
          <div class="form-group">
            <label>ETA</label><input type="time" id="inp-time" />
          </div>
        </div>
        <div class="form-group">
          <label>Route / Security Notes</label
          ><textarea
            id="inp-notes"
            rows="3"
            placeholder="e.g. Taking the N1 North, driving a White Polo"
          ></textarea>
        </div>
        <div
          style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
          "
        >
          <button
            class="btn-main"
            id="modal-close-btn"
            style="background: var(--faint); color: var(--cream)"
          >
            Close
          </button>
          <button class="btn-main" id="modal-save-btn">Save</button>
        </div>
      </div>
    </div>
    <audio
      id="alert-sound"
      src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"
      preload="auto"
      loop
    ></audio>
  </body>
</html>
